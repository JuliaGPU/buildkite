# CPU-only agent for the `upload` queue, handling pipeline upload jobs.
# It doesn't need the CUDA image or a GPU, just the plain Ubuntu base.

services:
  buildkite:
    hostname: gpuci.0
    build:
      context: ../../image/
    environment:
      JULIA_CPU_THREADS: 1
    env_file: ../token.env
    command:
      - start
      - --disconnect-after-job
      # with the default streaming ping mode, disconnect-after-job is only
      # evaluated on the stream's 60s tick, wasting a minute per job
      - --ping-mode=poll-only
      - --hooks-path=/hooks
      - --tags=queue=upload
      - --name=gpuci.0
    volumes:
      - /home/buildkite/gpuci.0:/root
