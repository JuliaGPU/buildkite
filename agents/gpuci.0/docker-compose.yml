# CPU-only agents for the `upload` queue, handling pipeline upload jobs.
# These don't need the CUDA image or a GPU, just the plain Ubuntu base.

services:
  buildkite:
    hostname: gpuci.0
    build:
      context: ../../image/
    environment:
      JULIA_CPU_THREADS: 1
    env_file: ../token.env
    command:
      - start
      - --disconnect-after-job
      - --hooks-path=/hooks
      - --tags=queue=upload
      - --name=gpuci.0.%spawn
      # each spawned agent runs a single job, after which the container exits
      # and systemd restarts it, so capacity cycles between 4 and 1 agents
      - --spawn=4
    volumes:
      - /home/buildkite/gpuci.0:/root
